[agents.delivery_lead]
description = "Orchestrates non-trivial repository tasks, selects review viewpoints, and synthesizes results."
config_file = "agents/delivery-lead.toml"

[agents.quality_reviewer]
description = "Reviews code quality, regressions, architecture boundaries, error handling, tests, and maintainability."
config_file = "agents/quality-reviewer.toml"

[agents.security_reviewer]
description = "Reviews authentication, authorization, API boundaries, external input, secrets, permissions, logging, and infrastructure risk."
